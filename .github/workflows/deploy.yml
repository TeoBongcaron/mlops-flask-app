name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AKIAYM7POD2HTJNPDCJB }}
        aws-secret-access-key: ${{ secrets.xR/8B9Bv1qR45bcZqdLRqeLUHbP4MeaJpdRvdg2K }}
        aws-region: us-east-1

    - name: Log in to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build and Push Docker Image
      run: |
        docker build -t mlops-flask-app .
        docker tag mlops-flask-app:latest 577638375055.dkr.ecr.us-east-1.amazonaws.com/mlops-flask-app:latest
        docker push 577638375055.dkr.ecr.us-east-1.amazonaws.com/mlops-flask-app:latest

    - name: Deploy to AWS App Runner
      uses: aws-actions/aws-apprunner-deploy@v1
      with:
        service-name: mlops-flask-app-service
        image-repository: 577638375055.dkr.ecr.us-east-1.amazonaws.com/mlops-flask-app:latest
        region: us-east-1
